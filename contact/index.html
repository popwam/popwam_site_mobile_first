<!DOCTYPE html>
<html lang="ar" dir="rtl">
  {% include "_head.html" %}
<body>
  {% include "_nav.html" %}
  <main class="container">
    <h1 data-i18n="contact.title">تواصل معنا</h1>
    <form id="contactForm" class="form">
      <label>
        <span data-i18n="contact.name">الاسم</span>
        <input type="text" name="name" required />
      </label>
      <label>
        <span data-i18n="contact.email">البريد الإلكتروني</span>
        <input type="email" name="email" required />
      </label>
      <label>
        <span data-i18n="contact.message">رسالتك</span>
        <textarea name="msg" rows="5" required></textarea>
      </label>
      <button type="submit" class="btn" data-i18n="contact.send">أرسل</button>
    </form>
  </main>
  {% include "_foot.html" %}
  <script src="/assets/js/main.js" defer></script>
</body>
</html>
